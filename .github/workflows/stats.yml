name: Update GitHub Stats

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Fetch GitHub Stats
        run: |
          COMMITS=$(curl -s -H "Authorization: token ${{ secrets.GH_TOKEN }}" \
            "https://api.github.com/search/commits?q=author:minsu616" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['total_count'])")
          STARS=$(curl -s -H "Authorization: token ${{ secrets.GH_TOKEN }}" \
            "https://api.github.com/users/minsu616/repos" \
            | python3 -c "import sys,json; print(sum(r['stargazers_count'] for r in json.load(sys.stdin)))")
          sed -i "s/COMMIT_COUNT/$COMMITS/g" index.html
          sed -i "s/STAR_COUNT/$STARS/g" index.html
      - uses: actions/commit-and-push@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
